<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiDash - Professional Analytics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        .controls { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #e0e0e0; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: bold; color: #666; }
        select, input, button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; outline: none; }
        button { background: #1a73e8; color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; padding: 10px 25px; }
        button:hover { background: #1557b0; }
        .chart-box { margin-top: 40px; padding: 20px; border-top: 1px solid #eee; }
        canvas { max-height: 450px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>OptiDash Analytics</h1>
        
        <div class="controls">
            <div class="control-group">
                <label>Step 1: Upload Excel</label>
                <input type="file" id="upload" accept=".xlsx, .xls">
            </div>
            <div class="control-group">
                <label>Category</label>
                <select id="filterCategory"><option value="">All Categories</option></select>
            </div>
            <div class="control-group">
                <label>Brand</label>
                <select id="filterBrand"><option value="">All Brands</option></select>
            </div>
            <div class="control-group">
                <label>Year</label>
                <select id="filterYear"><option value="">All Years</option></select>
            </div>
            <div class="control-group">
                <label>Month</label>
                <select id="filterMonth"><option value="">All Months</option></select>
            </div>
            <div class="control-group">
                <label>&nbsp;</label>
                <button id="processBtn">Generate Analytics</button>
            </div>
        </div>

        <div class="chart-box">
            <h3>Monthly Sales Trend (Line Chart)</h3>
            <canvas id="lineChart"></canvas>
        </div>
        
        <div class="chart-box">
            <h3>Inventory Distribution (Stacked Bar Chart)</h3>
            <canvas id="barChart"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
